<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GeoMacro Intel v8</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0c0f;--bg2:#111318;--bg3:#181c22;--border:#1e2530;--border2:#2a3340;
--text:#e8edf5;--muted:#6b7a8d;--green:#00d4aa;--blue:#4f8ef7;--amber:#f7a24f;
--red:#f74f4f;--gold:#f5c842;--purple:#9b6dff;
--mono:'DM Mono',monospace;--sans:'Syne',sans-serif}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
.header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:9px}
.lmark{width:26px;height:26px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center}
.ltxt{font-size:12px;font-weight:800;letter-spacing:.07em;text-transform:uppercase}
.lsub{font-size:8px;color:var(--muted);letter-spacing:.1em;font-family:var(--mono)}
.hmeta{display:flex;align-items:center;gap:10px}
.upd{font-size:9px;font-family:var(--mono);color:var(--muted)}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,170,.4)}50%{box-shadow:0 0 0 4px rgba(0,212,170,0)}}
.tabs-nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:2px;overflow-x:auto}
.tab-btn{padding:10px 14px;font-family:var(--sans);font-size:11px;font-weight:700;color:var(--muted);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;letter-spacing:.03em}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--green)}
.tab-btn.core-tab.active{border-bottom-color:var(--blue)}
.tab-btn.bt-tab.active{border-bottom-color:var(--purple)}
.tab-content{display:none;padding:18px 20px;max-width:1400px;margin:0 auto}
.tab-content.active{display:block}
.alerts-bar{display:flex;gap:7px;margin-bottom:16px;overflow-x:auto;padding-bottom:3px;flex-wrap:wrap}
.alert-chip{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:16px;border:1px solid;white-space:nowrap;font-size:9px;font-family:var(--mono)}
.alert-chip.high{border-color:rgba(0,212,170,.3);background:rgba(0,212,170,.07);color:var(--green)}
.alert-chip.medium{border-color:rgba(247,162,79,.3);background:rgba(247,162,79,.07);color:var(--amber)}
.alert-chip.core,.alert-chip.important{border-color:rgba(79,142,247,.3);background:rgba(79,142,247,.07);color:var(--blue)}
.adot{width:5px;height:5px;border-radius:50%;background:currentColor}
.sec-title{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-family:var(--mono);margin-bottom:11px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
.rank-table{display:grid;gap:6px;margin-bottom:20px}
.rank-hdr{display:grid;grid-template-columns:28px 1fr 80px 90px 70px 80px 60px 1fr;gap:10px;padding:0 14px;font-size:8px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.rank-row{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;display:grid;grid-template-columns:28px 1fr 80px 90px 70px 80px 60px 1fr;align-items:center;gap:10px;transition:border-color .15s}
.rank-row:hover{border-color:var(--border2)}
.sbar-w{display:flex;align-items:center;gap:6px}
.sbar{height:3px;flex:1;background:var(--bg3);border-radius:2px;overflow:hidden}
.sbar-f{height:100%;border-radius:2px}
.sig-badge{font-size:8px;font-weight:700;font-family:var(--mono);padding:3px 7px;border-radius:3px;text-align:center;white-space:nowrap}
.sig-buy{background:rgba(0,212,170,.12);color:var(--green);border:1px solid rgba(0,212,170,.25)}
.sig-sell{background:rgba(247,79,79,.12);color:var(--red);border:1px solid rgba(247,79,79,.25)}
.sig-wait{background:rgba(247,162,79,.1);color:var(--amber);border:1px solid rgba(247,162,79,.2)}
.sig-geo{background:rgba(79,142,247,.1);color:var(--blue);border:1px solid rgba(79,142,247,.2)}
.rsumm{font-size:9px;color:var(--muted);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px;margin-bottom:20px}
.asset-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;overflow:hidden}
.ac-head{padding:12px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ac-name{font-size:12px;font-weight:700}
.ac-price{font-size:15px;font-weight:800;font-family:var(--mono)}
.ac-body{padding:12px 13px}
.ind-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:9px}
.ind-item{background:var(--bg3);border-radius:5px;padding:6px 8px}
.ind-lbl{font-size:7px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.ind-val{font-size:11px;font-weight:700;font-family:var(--mono)}
.lvl-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:8px}
.lvl-box{border-radius:4px;padding:5px 7px;text-align:center;border:1px solid}
.lvl-lbl{font-size:7px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;opacity:.7}
.lvl-p{font-size:10px;font-weight:700;font-family:var(--mono)}
.lvl-pct{font-size:8px;font-family:var(--mono);opacity:.55}
.audit-box{background:var(--bg3);border-radius:5px;padding:7px 9px;margin-bottom:8px;font-size:9px;font-family:var(--mono)}
.k-sec{border-top:1px solid var(--border);padding-top:9px}
.k-tabs{display:flex;gap:4px;margin-bottom:7px}
.k-tab{font-size:8px;font-family:var(--mono);padding:2px 7px;border-radius:3px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--muted);transition:all .15s}
.k-tab.active{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.k-text{font-size:9px;color:var(--muted);line-height:1.7;font-family:var(--mono);max-height:110px;overflow-y:auto;white-space:pre-wrap}
.geo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;margin-bottom:20px}
.geo-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:13px}
.gc-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin:6px 0}
.gc-bar-f{height:100%;border-radius:2px}
.news-item{font-size:9px;color:var(--muted);font-family:var(--mono);padding:4px 0;border-bottom:1px solid var(--border);line-height:1.4}
.news-item:last-child{border:none}
.core-header{background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.2);border-radius:9px;padding:14px;margin-bottom:14px}
.core-total{font-size:24px;font-weight:800;font-family:var(--mono);color:var(--blue)}
.core-warning{background:rgba(247,79,79,.05);border:1px solid rgba(247,79,79,.15);border-radius:7px;padding:10px 12px;margin-bottom:14px;font-size:9px;color:var(--muted);font-family:var(--mono);line-height:1.6}
.pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:9px;margin-bottom:14px}
.pos-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px}
.metric-row{display:flex;justify-content:space-between;font-size:9px;font-family:var(--mono);padding:2px 0;border-bottom:1px solid var(--border)}
.metric-row:last-child{border:none}
.drift-track{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin:5px 0}
.drift-fill{height:100%;border-radius:2px}
.quarterly-card{background:rgba(79,142,247,.04);border:1px solid rgba(79,142,247,.15);border-radius:8px;padding:13px;margin-bottom:14px}
.qc-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);color:var(--blue);margin-bottom:8px}
.conv-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:10px;font-family:var(--mono)}
.conv-badge{font-size:8px;font-family:var(--mono);padding:2px 7px;border-radius:3px;font-weight:700}
.conv-intact{background:rgba(0,212,170,.12);color:var(--green);border:1px solid rgba(0,212,170,.25)}
.conv-weak{background:rgba(247,162,79,.1);color:var(--amber);border:1px solid rgba(247,162,79,.2)}
.conv-inv{background:rgba(247,79,79,.1);color:var(--red);border:1px solid rgba(247,79,79,.25)}
.review-text{font-size:9px;color:var(--muted);font-family:var(--mono);line-height:1.7;margin-top:9px;max-height:200px;overflow-y:auto;white-space:pre-wrap}
.perf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:14px}
.perf-card{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:10px}
.perf-lbl{font-size:8px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.perf-val{font-size:16px;font-weight:800;font-family:var(--mono)}
.bt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:20px}
.bt-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:14px}
.bt-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:10px;font-family:var(--mono)}
.bt-row:last-child{border:none}
.bt-bar-track{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:8px 0}
.bt-bar-fill{height:100%;border-radius:4px}
.macro-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px;margin-bottom:20px}
.macro-card{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:11px}
.mc-lbl{font-size:8px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.mc-val{font-size:18px;font-weight:800;font-family:var(--mono);line-height:1}
.risk-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.risk-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px}
.rc-track{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:6px}
.rc-fill{height:100%;border-radius:2px}
.rc-desc{font-size:10px;color:var(--muted);line-height:1.55;margin-bottom:5px}
.rc-assets{display:flex;gap:5px;flex-wrap:wrap}
.rc-tag{font-size:8px;font-family:var(--mono);padding:2px 5px;border-radius:3px;background:var(--bg3);border:1px solid var(--border);color:var(--muted)}
.audit-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:20px}
.audit-tbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:9px}
.audit-tbl th{text-align:left;padding:7px 11px;color:var(--muted);border-bottom:1px solid var(--border);font-weight:400;text-transform:uppercase;letter-spacing:.08em}
.audit-tbl td{padding:7px 11px;border-bottom:1px solid var(--border)}
.audit-tbl tr:last-child td{border:none}
.mod-badge{font-size:7px;padding:2px 5px;border-radius:2px;font-weight:700;text-transform:uppercase}
.mod-trading{background:rgba(247,162,79,.1);color:var(--amber)}
.mod-geo{background:rgba(79,142,247,.1);color:var(--blue)}
.mod-core{background:rgba(0,212,170,.1);color:var(--green)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:12px;color:var(--muted);font-family:var(--mono);font-size:11px}
.ld{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1s infinite}
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <div class="lmark"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 2L14 5.5V10.5L8 14L2 10.5V5.5L8 2Z" stroke="#0a0c0f" stroke-width="1.5"/><circle cx="8" cy="8" r="2" fill="#0a0c0f"/></svg></div>
    <div><div class="ltxt">GeoMacro Intel</div><div class="lsub">Professional Engine v8 · Kahneman · Auto-Audit · Backtesting</div></div>
  </div>
  <div class="hmeta"><div class="pulse"></div><div class="upd" id="upd">Cargando...</div></div>
</div>
<div class="tabs-nav">
  <button class="tab-btn active" onclick="showTab('ranking')">🏆 Ranking</button>
  <button class="tab-btn" onclick="showTab('trading')">⚡ Trading</button>
  <button class="tab-btn" onclick="showTab('geo')">🌍 Geoestrategico</button>
  <button class="tab-btn core-tab" onclick="showTab('core')">🏛 Cartera Core</button>
  <button class="tab-btn bt-tab" onclick="showTab('backtest')">📊 Backtesting</button>
  <button class="tab-btn" onclick="showTab('paper')" style="border-bottom-color:#9b6dff">📝 Paper Trading</button>
  <button class="tab-btn" onclick="showTab('macro')">📈 Macro / Riesgos</button>
  <button class="tab-btn" onclick="showTab('audit')">📋 Auditoría</button>
</div>
<div id="loading" class="loading"><div class="ld"></div>Cargando results.json...</div>
<div id="tab-ranking"  class="tab-content active" style="display:none"></div>
<div id="tab-trading"  class="tab-content" style="display:none"></div>
<div id="tab-geo"      class="tab-content" style="display:none"></div>
<div id="tab-core"     class="tab-content" style="display:none"></div>
<div id="tab-backtest" class="tab-content" style="display:none"></div>
<div id="tab-macro"    class="tab-content" style="display:none"></div>
<div id="tab-audit"    class="tab-content" style="display:none"></div>
<div id="tab-paper"    class="tab-content" style="display:none"></div>
<script>
var DATA=null;
function sc(n){return n>=70?'var(--green)':n>=50?'var(--amber)':'var(--red)';}
function fmt(n,d){d=d||2;return n!=null?Number(n).toFixed(d):'—';}
function fmtEUR(n){return n!=null?'€'+Number(n).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';}
function sigClass(s){
  if(!s) return 'sig-wait';
  var u=s.toUpperCase();
  if(u.indexOf('COMPRAR')>=0||u.indexOf('BUY')>=0) return 'sig-buy';
  if(u.indexOf('VENDER')>=0||u.indexOf('SELL')>=0) return 'sig-sell';
  if(u.indexOf('OPORTUNIDAD_ALTA')>=0) return 'sig-buy';
  if(u.indexOf('OPORTUNIDAD_MEDIA')>=0) return 'sig-geo';
  return 'sig-wait';
}
function sigLabel(s){
  if(!s) return '—';
  var u=s.toUpperCase();
  if(u.indexOf('COMPRAR')>=0||u.indexOf('BUY')>=0) return '▲ COMPRAR';
  if(u.indexOf('VENDER')>=0||u.indexOf('SELL')>=0) return '▼ VENDER';
  if(u.indexOf('OPORTUNIDAD_ALTA')>=0) return '★ OPP ALTA';
  if(u.indexOf('OPORTUNIDAD_MEDIA')>=0) return '◎ OPP MED.';
  if(u.indexOf('EVITAR')>=0) return '✕ EVITAR';
  return '◎ ESPERAR';
}
function tc(t){
  var m={'energy':'#f74f4f','precious':'#f5c842','industrial':'#e8793c','critical':'#00d4aa',
    'SE Asia':'#4f8ef7','South Asia':'#9b6dff','CEE Europa':'#00d4aa','CEE Europe':'#00d4aa',
    'LATAM':'#f7a24f','MENA':'#e8793c','Africa Sub.':'#f5c842','Afrika Sub.':'#f5c842'};
  return m[t]||'#6b7a8d';
}
function cleanSummary(s){
  if(!s) return '—';
  var t=s.trim();
  if(t.charAt(0)==='{'){
    try{var o=JSON.parse(t);return o.summary||o.signal||'—';}catch(e){}
    // extract summary manually
    var m=t.match(/"summary"\s*:\s*"([^"]+)"/);
    if(m) return m[1];
    return t.slice(0,80)+'...';
  }
  if(t.slice(0,3)==='```'){
    var c=t.replace(/```json/g,'').replace(/```/g,'').trim();
    try{var o=JSON.parse(c);return o.summary||o.signal||'—';}catch(e){}
    return c.slice(0,80);
  }
  return t.replace(/\n/g,' ').slice(0,120);
}
function showTab(name){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.tab-content').forEach(function(c){c.style.display='none';c.classList.remove('active');});
  var btns=document.querySelectorAll('.tab-btn');
  for(var i=0;i<btns.length;i++){if(btns[i].getAttribute('onclick').indexOf("'"+name+"'")>=0){btns[i].classList.add('active');break;}}
  var panel=document.getElementById('tab-'+name);
  if(panel){panel.style.display='block';panel.classList.add('active');}
  if(DATA) renderTab(name,DATA);
}
function renderAlerts(alerts){
  if(!alerts||!alerts.length) return '';
  var h='<div class="alerts-bar">';
  alerts.forEach(function(a){
    var cls=a.module==='core'?'core':(a.severity||'medium');
    h+='<div class="alert-chip '+cls+'"><div class="adot"></div>'+a.message+'</div>';
  });
  return h+'</div>';
}
function renderRanking(data,el){
  var items=data.ranking||[]; var alerts=data.alerts||[];
  var h=renderAlerts(alerts);
  h+='<div class="sec-title">Ranking unificado — commodities + regiones · auto-auditoría</div>';
  h+='<div class="rank-table"><div class="rank-hdr"><span>#</span><span>Activo</span><span>Score</span><span>Señal</span><span>P(éxito)</span><span>Kelly/PIB</span><span>Audit</span><span>Síntesis IA</span></div>';
  items.forEach(function(r){
    var color=tc(r.type);
    var auditHtml=r.audit_passed===false?'<span style="color:var(--red);font-size:9px;font-family:var(--mono)">✗ FAIL</span>':'<span style="color:var(--green);font-size:9px;font-family:var(--mono)">✓ OK</span>';
    var kellyPib=r.category==='commodity'?(r.kelly!=null?Math.round(r.kelly*100)+'%':'—'):(r.gdp!=null?(r.gdp>0?'+':'')+r.gdp+'%':'—');
    var probColor=r.prob>=60?'var(--green)':r.prob>=45?'var(--amber)':'var(--red)';
    h+='<div class="rank-row">'
      +'<div style="font-size:10px;font-weight:700;font-family:var(--mono);color:var(--muted)">'+r.rank+'</div>'
      +'<div><div style="font-size:12px;font-weight:700">'+r.name+'</div>'
      +'<span style="font-size:8px;font-family:var(--mono);padding:2px 5px;border-radius:3px;color:'+color+';background:'+color+'18;border:1px solid '+color+'30">'+r.type+'</span></div>'
      +'<div class="sbar-w"><div class="sbar"><div class="sbar-f" style="width:'+r.score+'%;background:'+sc(r.score)+'"></div></div><span style="font-size:10px;font-family:var(--mono);color:'+sc(r.score)+'">'+r.score+'</span></div>'
      +'<div><span class="sig-badge '+sigClass(r.signal)+'">'+sigLabel(r.signal)+'</span></div>'
      +'<div style="font-size:10px;font-family:var(--mono);color:'+probColor+'">'+(r.prob!=null?r.prob+'%':'—')+(r.prob_interval?'±'+r.prob_interval+'%':'')+'</div>'
      +'<div style="font-size:10px;font-family:var(--mono);color:var(--blue)">'+kellyPib+'</div>'
      +auditHtml
      +'<div class="rsumm">'+cleanSummary(r.summary)+'</div>'
      +'</div>';
  });
  h+='</div>';
  el.innerHTML=h;
}
function renderTrading(data,el){
  var assets=(data.trading||[]).filter(function(a){return a.quant;});
  var h='<div class="sec-title">Trading — auto-auditoría · Kahneman v8 · stops 2×ATR · Kelly 50%</div><div class="asset-grid">';
  assets.forEach(function(a){
    var q=a.quant; var m=a.meta; var cal=(a.analysis&&a.analysis.calibration)||{};
    var audit=(a.analysis&&a.analysis.audit)||{}; var color=tc(m.type);
    var mom1=q.momentum_1m||0;
    h+='<div class="asset-card">'
      +'<div class="ac-head"><div><div class="ac-name">'+m.name+'</div>'
      +'<span style="font-size:8px;font-family:var(--mono);padding:2px 5px;border-radius:3px;color:'+color+';background:'+color+'18;border:1px solid '+color+'30">'+m.type+' · '+m.unit+'</span></div>'
      +'<div style="text-align:right"><div class="ac-price" style="color:'+color+'">$'+(q.price||0).toLocaleString('en-US')+'</div>'

      +auditTd
      +'<td style="color:var(--muted)">'+(l.claude_calls!=null?l.claude_calls:'—')+'</td>'
      +'<td style="color:'+(l.status&&(l.status.indexOf('complete')>=0||l.status.indexOf('review')>=0)?'var(--green)':'var(--muted)')+'>">'+(l.status||'—')+'</td>'
      +'</tr>';
  });
  h+='</tbody></table></div>';
  el.innerHTML=h;
}
function kTab(btn,id){
  var card=btn.closest('.asset-card,.geo-card');
  if(!card) return;
  card.querySelectorAll('.k-tab').forEach(function(t){t.classList.remove('active');});
  card.querySelectorAll('.k-text').forEach(function(c){c.style.display='none';});
  btn.classList.add('active');
  var el=document.getElementById(id);
  if(el) el.style.display='block';
}
function renderTab(name,d){
  var el=document.getElementById('tab-'+name);
  if(!el) return;
  if(name==='ranking')  renderRanking(d,el);
  else if(name==='trading')  renderTrading(d,el);
  else if(name==='geo')      renderGeo(d,el);
  else if(name==='core')     renderCore(d,el);
  else if(name==='backtest') renderBacktest(d,el);
  else if(name==='macro')    renderMacro(d,el);
  else if(name==='audit')    renderAudit(d,el);
  else if(name==='paper')    renderPaper(d,el);
}
function renderPaper(data,el){
  var pt=data.paper_trading||{}; var trades=pt.trades||[]; var s=pt.stats||{};
  if(!trades.length){
    el.innerHTML='<div class="sec-title">Paper Trading — simulación automática de señales</div>'
      +'<div style="font-size:10px;font-family:var(--mono);color:var(--muted);padding:20px">'
      +'El sistema registra automáticamente cada señal COMPRAR/VENDER.<br>'
      +'Las primeras señales aparecerán en la próxima ejecución que emita señales con p>40%.</div>';
    return;
  }
  var h='<div class="sec-title">Paper Trading — simulación automática · sin dinero real</div>';
  // Stats globales
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:16px">';
  var statItems=[
    {l:'Total señales',v:s.total_signals||0,c:'var(--text)'},
    {l:'Abiertas',v:s.open||0,c:'var(--amber)'},
    {l:'Cerradas',v:s.closed||0,c:'var(--muted)'},
    {l:'Win Rate',v:s.win_rate_pct!=null?s.win_rate_pct+'%':'—',c:s.win_rate_pct>=55?'var(--green)':s.win_rate_pct>=45?'var(--amber)':'var(--red)'},
    {l:'Media ganancia',v:s.avg_win_pct!=null?'+'+s.avg_win_pct+'%':'—',c:'var(--green)'},
    {l:'Media pérdida',v:s.avg_loss_pct!=null?s.avg_loss_pct+'%':'—',c:'var(--red)'},
    {l:'Expectancy',v:s.expectancy_pct!=null?(s.expectancy_pct>0?'+':'')+s.expectancy_pct+'%':'—',c:s.expectancy_pct>0?'var(--green)':'var(--red)'},
  ];
  statItems.forEach(function(i){
    h+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:10px">'
      +'<div style="font-size:8px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">'+i.l+'</div>'
      +'<div style="font-size:18px;font-weight:800;font-family:var(--mono);color:'+i.c+'">'+i.v+'</div></div>';
  });
  h+='</div>';
  // Nota importante
  h+='<div style="background:rgba(155,109,255,.06);border:1px solid rgba(155,109,255,.2);border-radius:7px;padding:10px 12px;margin-bottom:14px;font-size:9px;font-family:var(--mono);color:var(--muted);line-height:1.6">'
    +'<strong style="color:var(--purple)">Regla Kahneman</strong> — Estas señales son simuladas. '
    +'Mínimo 3 meses y 20 señales cerradas antes de considerar ejecutar cualquier operación real. '
    +'Win rate >55% sostenido = el sistema tiene ventaja estadística. Por debajo = no operar.</div>';
  // Tabla de trades
  h+='<div style="font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-family:var(--mono);margin-bottom:11px;display:flex;align-items:center;gap:8px">Historial de señales<span style="flex:1;height:1px;background:var(--border);display:block"></span></div>';
  h+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden">'
    +'<table style="width:100%;border-collapse:collapse;font-family:var(--mono);font-size:9px">'
    +'<thead><tr style="border-bottom:1px solid var(--border)">'
    +'<th style="text-align:left;padding:7px 11px;color:var(--muted);font-weight:400">Activo</th>'
    +'<th style="text-align:left;padding:7px 11px;color:var(--muted);font-weight:400">Señal</th>'
    +'<th style="text-align:left;padding:7px 11px;color:var(--muted);font-weight:400">Fecha entrada</th>'
    +'<th style="text-align:right;padding:7px 11px;color:var(--muted);font-weight:400">Entrada</th>'
    +'<th style="text-align:right;padding:7px 11px;color:var(--muted);font-weight:400">Stop</th>'
    +'<th style="text-align:right;padding:7px 11px;color:var(--muted);font-weight:400">Target</th>'
    +'<th style="text-align:right;padding:7px 11px;color:var(--muted);font-weight:400">P(éxito)</th>'
    +'<th style="text-align:right;padding:7px 11px;color:var(--muted);font-weight:400">PnL actual</th>'
    +'<th style="text-align:left;padding:7px 11px;color:var(--muted);font-weight:400">Estado</th>'
    +'</tr></thead><tbody>';
  // Ordenar: abiertos primero, luego cerrados por fecha
  var sorted=trades.slice().sort(function(a,b){
    if(a.status==='open'&&b.status!=='open') return -1;
    if(a.status!=='open'&&b.status==='open') return 1;
    return 0;
  });
  sorted.forEach(function(t){
    var statusColor=t.status==='open'?'var(--amber)':t.result==='win'?'var(--green)':'var(--red)';
    var statusLabel=t.status==='open'?'ABIERTA':t.status==='target_hit'?'✓ TARGET':'✗ STOP';
    var pnlColor=(t.current_pnl_pct||0)>=0?'var(--green)':'var(--red)';
    var finalPnl=t.status==='open'
      ?(t.current_pnl_pct!=null?(t.current_pnl_pct>0?'+':'')+t.current_pnl_pct+'%':'—')
      :(t.pnl_pct!=null?(t.pnl_pct>0?'+':'')+t.pnl_pct+'%':'—');
    var finalPnlColor=t.status==='open'?pnlColor:(t.result==='win'?'var(--green)':'var(--red)');
    h+='<tr style="border-bottom:1px solid var(--border)">'
      +'<td style="padding:7px 11px;font-weight:700">'+t.asset+'</td>'
      +'<td style="padding:7px 11px"><span style="font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;background:'+(t.signal==='COMPRAR'?'rgba(0,212,170,.12)':'rgba(247,79,79,.12)')+';color:'+(t.signal==='COMPRAR'?'var(--green)':'var(--red)')+'">'+t.signal+'</span></td>'
      +'<td style="padding:7px 11px;color:var(--muted)">'+t.entry_date+'</td>'
      +'<td style="padding:7px 11px;text-align:right">$'+t.entry_price+'</td>'
      +'<td style="padding:7px 11px;text-align:right;color:var(--red)">$'+t.stop_price+'</td>'
      +'<td style="padding:7px 11px;text-align:right;color:var(--green)">$'+t.target_price+'</td>'
      +'<td style="padding:7px 11px;text-align:right;color:var(--amber)">'+(t.prob!=null?t.prob+'%':'—')+'</td>'
      +'<td style="padding:7px 11px;text-align:right;color:'+finalPnlColor+'">'+finalPnl+'</td>'
      +'<td style="padding:7px 11px"><span style="color:'+statusColor+'">'+statusLabel+'</span></td>'
      +'</tr>';
  });
  h+='</tbody></table></div>';
  el.innerHTML=h;
}
async function load(){
  try{
    var r=await fetch('/FINANZAS/results.json?t='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    var d=await r.json(); DATA=d;
    document.getElementById('upd').textContent='Actualizado: '+(d.generated_at||'—')+' · '+(d.quarter||'')+(d.is_quarterly?' · ✓ Rev.Q':'')+(d.is_weekly?' · ✓ Backtest':'');
    document.getElementById('loading').style.display='none';
    var activeTab=document.querySelector('.tab-btn.active');
    var tabName='ranking';
    if(activeTab){var m=activeTab.getAttribute('onclick').match(/'(\w+)'/);if(m) tabName=m[1];}
    document.querySelectorAll('.tab-content').forEach(function(c){c.style.display='none';c.classList.remove('active');});
    var panel=document.getElementById('tab-'+tabName);
    if(panel){panel.style.display='block';panel.classList.add('active');}
    renderTab(tabName,d);
  }catch(e){
    document.getElementById('loading').innerHTML='<div style="color:var(--red);font-family:var(--mono);text-align:center;max-width:400px"><div style="font-size:22px;margin-bottom:10px">⚠</div><div style="font-weight:700;margin-bottom:7px">results.json no encontrado</div><div style="color:var(--muted);font-size:10px;line-height:1.6">Ejecuta el workflow desde GitHub Actions.<br>'+e.message+'</div></div>';
  }
}
load();
setInterval(load,10*60*1000);
</script>
</body>
</html>
