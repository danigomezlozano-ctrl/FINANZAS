<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GeoMacro Intel v5</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c0f;--bg2:#111318;--bg3:#181c22;
  --border:#1e2530;--border2:#2a3340;
  --text:#e8edf5;--muted:#6b7a8d;
  --green:#00d4aa;--blue:#4f8ef7;--amber:#f7a24f;
  --red:#f74f4f;--gold:#f5c842;--purple:#9b6dff;
  --mono:'DM Mono',monospace;--sans:'Syne',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
/* ── Header ── */
.header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:28px;height:28px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center}
.logo-text{font-size:13px;font-weight:800;letter-spacing:.07em;text-transform:uppercase}
.logo-sub{font-size:8px;color:var(--muted);letter-spacing:.1em;font-family:var(--mono)}
.header-meta{display:flex;align-items:center;gap:12px}
.updated{font-size:9px;font-family:var(--mono);color:var(--muted)}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,170,.4)}50%{box-shadow:0 0 0 5px rgba(0,212,170,0)}}
/* ── Layout ── */
.page{max-width:1400px;margin:0 auto;padding:20px 24px}
.section-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-family:var(--mono);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
/* ── Alerts bar ── */
.alerts-bar{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px}
.alert-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;border:1px solid;white-space:nowrap;font-size:10px;font-family:var(--mono);flex-shrink:0}
.alert-chip.high{border-color:rgba(0,212,170,.3);background:rgba(0,212,170,.08);color:var(--green)}
.alert-chip.medium{border-color:rgba(247,162,79,.3);background:rgba(247,162,79,.08);color:var(--amber)}
.alert-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
/* ── Ranking table ── */
.ranking-grid{display:grid;gap:7px;margin-bottom:24px}
.rank-row{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:13px 16px;display:grid;grid-template-columns:28px 1fr 80px 90px 70px 80px 90px 1fr;align-items:center;gap:12px;transition:border-color .15s}
.rank-row:hover{border-color:var(--border2)}
.rank-row.header-row{background:transparent;border:none;padding:0 16px;font-size:8px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.rank-num{font-size:11px;font-weight:700;font-family:var(--mono);color:var(--muted)}
.rank-name{font-size:12px;font-weight:700}
.rank-type{font-size:8px;font-family:var(--mono);padding:2px 6px;border-radius:3px;display:inline-block}
.score-bar-wrap{display:flex;align-items:center;gap:7px}
.score-bar{height:3px;flex:1;background:var(--bg3);border-radius:2px;overflow:hidden}
.score-fill{height:100%;border-radius:2px;transition:width 1s ease}
.score-num{font-size:10px;font-family:var(--mono);width:24px;text-align:right}
.signal-badge{font-size:9px;font-weight:700;font-family:var(--mono);padding:3px 8px;border-radius:4px;text-align:center}
.signal-badge.buy{background:rgba(0,212,170,.12);color:var(--green);border:1px solid rgba(0,212,170,.25)}
.signal-badge.sell{background:rgba(247,79,79,.12);color:var(--red);border:1px solid rgba(247,79,79,.25)}
.signal-badge.wait{background:rgba(247,162,79,.1);color:var(--amber);border:1px solid rgba(247,162,79,.2)}
.prob-val{font-size:10px;font-family:var(--mono)}
.kelly-val{font-size:10px;font-family:var(--mono)}
.rank-summary{font-size:9px;color:var(--muted);font-family:var(--mono);line-height:1.5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* ── Asset detail cards ── */
.assets-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px;margin-bottom:24px}
.asset-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.asset-card-header{padding:13px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.asset-name{font-size:13px;font-weight:700}
.asset-price{font-size:16px;font-weight:800;font-family:var(--mono)}
.asset-card-body{padding:13px 14px}
/* Indicator row */
.ind-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.ind-item{background:var(--bg3);border-radius:5px;padding:7px 9px}
.ind-label{font-size:7px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.ind-value{font-size:12px;font-weight:700;font-family:var(--mono)}
/* Levels */
.levels-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.level-box{border-radius:5px;padding:6px 8px;text-align:center;border:1px solid}
.level-label{font-size:7px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;opacity:.7}
.level-price{font-size:11px;font-weight:700;font-family:var(--mono)}
.level-pct{font-size:8px;font-family:var(--mono);opacity:.6}
/* Kahneman section */
.kahneman-section{border-top:1px solid var(--border);padding-top:10px;margin-top:2px}
.k-tab-row{display:flex;gap:5px;margin-bottom:8px}
.k-tab{font-size:8px;font-family:var(--mono);padding:3px 8px;border-radius:3px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--muted);transition:all .15s}
.k-tab.active{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.k-content{font-size:9px;color:var(--muted);line-height:1.7;font-family:var(--mono);max-height:120px;overflow-y:auto}
/* Regions */
.regions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:24px}
.region-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px}
.region-name{font-size:12px;font-weight:700;margin-bottom:4px}
.region-sub{font-size:9px;color:var(--muted);font-family:var(--mono);margin-bottom:8px}
.region-gdp{font-size:18px;font-weight:800;font-family:var(--mono);margin-bottom:2px}
.region-trend{font-size:9px;font-family:var(--mono)}
/* Macro panel */
.macro-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:24px}
.macro-card{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:11px}
.macro-label{font-size:8px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.macro-value{font-size:18px;font-weight:800;font-family:var(--mono)}
/* Audit log */
.audit-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:9px}
.audit-table th{text-align:left;padding:6px 10px;color:var(--muted);border-bottom:1px solid var(--border);font-weight:400;text-transform:uppercase;letter-spacing:.08em}
.audit-table td{padding:6px 10px;border-bottom:1px solid var(--border);color:var(--text)}
.audit-table tr:last-child td{border-bottom:none}
/* Utils */
.up{color:var(--green)}.down{color:var(--red)}.neu{color:var(--muted)}
.tag{font-size:8px;font-family:var(--mono);padding:2px 6px;border-radius:3px}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.loading{display:flex;align-items:center;justify-content:center;height:50vh;flex-direction:column;gap:12px;color:var(--muted);font-family:var(--mono);font-size:12px}
.loading-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1s infinite}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-mark">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path d="M8 2L14 5.5V10.5L8 14L2 10.5V5.5L8 2Z" stroke="#0a0c0f" stroke-width="1.5"/>
        <circle cx="8" cy="8" r="2" fill="#0a0c0f"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">GeoMacro Intel</div>
      <div class="logo-sub">Quantitative Engine v5 · Kahneman Framework</div>
    </div>
  </div>
  <div class="header-meta">
    <div class="pulse"></div>
    <div class="updated" id="updated-at">Cargando...</div>
  </div>
</div>

<div id="loading" class="loading">
  <div class="loading-dot"></div>
  Cargando results.json...
</div>

<div id="app" class="page" style="display:none"></div>

<script>
const $ = id => document.getElementById(id);

function scoreColor(s){
  if(s >= 70) return 'var(--green)';
  if(s >= 50) return 'var(--amber)';
  return 'var(--red)';
}
function signalClass(sig){
  if(!sig) return 'wait';
  const s = sig.toUpperCase();
  if(s.includes('COMPRAR') || s.includes('BUY'))  return 'buy';
  if(s.includes('VENDER')  || s.includes('SELL')) return 'sell';
  return 'wait';
}
function signalLabel(sig){
  if(!sig) return '—';
  const s = sig.toUpperCase();
  if(s.includes('COMPRAR') || s.includes('BUY'))  return '▲ COMPRAR';
  if(s.includes('VENDER')  || s.includes('SELL')) return '▼ VENDER';
  return '◎ ESPERAR';
}
function fmt(n, dec=2){ return n != null ? Number(n).toFixed(dec) : '—'; }
function fmtK(n){ if(n==null) return '—'; if(n>=1000) return '$'+fmt(n/1000,1)+'K'; return '$'+fmt(n,2); }
function typeColor(t){
  return {energy:'#f74f4f',precious:'#f5c842',industrial:'#e8793c',critical:'#00d4aa'}[t]||'#6b7a8d';
}
function typeLabel(t){
  return {energy:'Energía',precious:'Precioso',industrial:'Industrial',critical:'Crítico'}[t]||t;
}

function renderAlerts(alerts){
  if(!alerts?.length) return '';
  return `<div class="alerts-bar">${alerts.map(a=>`
    <div class="alert-chip ${a.severity}">
      <div class="alert-dot"></div>
      ${a.message}
    </div>`).join('')}</div>`;
}

function renderRanking(ranking){
  if(!ranking?.length) return '';
  return `
    <div class="section-title">Ranking por score compuesto (técnico 40% + fundamental 60%)</div>
    <div class="ranking-grid">
      <div class="rank-row header-row">
        <div>#</div><div>Activo</div><div>Score</div>
        <div>Señal</div><div>P(éxito)</div><div>Kelly</div>
        <div>Volatilidad</div><div>Síntesis IA</div>
      </div>
      ${ranking.map(r=>`
      <div class="rank-row">
        <div class="rank-num">${r.rank}</div>
        <div>
          <div class="rank-name">${r.name}</div>
          <span class="rank-type tag" style="color:${typeColor(r.type)};background:${typeColor(r.type)}18;border:1px solid ${typeColor(r.type)}30">${typeLabel(r.type)}</span>
        </div>
        <div class="score-bar-wrap">
          <div class="score-bar"><div class="score-fill" style="width:${r.score}%;background:${scoreColor(r.score)}"></div></div>
          <div class="score-num" style="color:${scoreColor(r.score)}">${r.score}</div>
        </div>
        <div><span class="signal-badge ${signalClass(r.signal)}">${signalLabel(r.signal)}</span></div>
        <div class="prob-val" style="color:${r.prob>=60?'var(--green)':r.prob>=45?'var(--amber)':'var(--red)'}">${r.prob!=null?r.prob+'%':'—'}</div>
        <div class="kelly-val" style="color:var(--blue)">${r.kelly!=null?Math.round(r.kelly*100)+'%':'—'}</div>
        <div class="prob-val" style="color:var(--amber)">${r.vol!=null?r.vol+'%':'—'}</div>
        <div class="rank-summary">${r.summary||'—'}</div>
      </div>`).join('')}
    </div>`;
}

function renderAssets(assets){
  if(!assets?.length) return '';
  return `
    <div class="section-title">Análisis detallado por activo</div>
    <div class="assets-grid">
      ${assets.filter(a=>a.quant?.price).map(a=>{
        const q = a.quant;
        const m = a.meta;
        const cal = a.analysis?.calibration || {};
        const tc = typeColor(m.type);
        const mom1 = q.momentum_1m;
        const mom3 = q.momentum_3m;
        return `
        <div class="asset-card">
          <div class="asset-card-header">
            <div>
              <div class="asset-name">${m.name}</div>
              <span class="tag" style="color:${tc};background:${tc}18;border:1px solid ${tc}30">${typeLabel(m.type)} · ${m.unit}</span>
            </div>
            <div style="text-align:right">
              <div class="asset-price" style="color:${tc}">$${q.price?.toLocaleString('en-US')}</div>
              <div style="font-size:9px;font-family:var(--mono);color:${mom1>=0?'var(--green)':'var(--red)'}">${mom1!=null?(mom1>=0?'▲ +':'▼ ')+fmt(mom1)+'% (1M)':'—'}</div>
            </div>
          </div>
          <div class="asset-card-body">
            <!-- Indicadores técnicos -->
            <div class="ind-grid">
              <div class="ind-item">
                <div class="ind-label">RSI 14</div>
                <div class="ind-value" style="color:${q.rsi<30?'var(--green)':q.rsi>70?'var(--red)':'var(--text)'}">${fmt(q.rsi,1)}</div>
              </div>
              <div class="ind-item">
                <div class="ind-label">MACD hist</div>
                <div class="ind-value" style="color:${q.macd_histogram>0?'var(--green)':'var(--red)'}">${fmt(q.macd_histogram,4)}</div>
              </div>
              <div class="ind-item">
                <div class="ind-label">ATR</div>
                <div class="ind-value">${fmt(q.atr,3)}</div>
              </div>
              <div class="ind-item">
                <div class="ind-label">Vol. anual</div>
                <div class="ind-value" style="color:${q.volatility>40?'var(--red)':q.volatility>20?'var(--amber)':'var(--green)'}">${q.volatility!=null?q.volatility+'%':'—'}</div>
              </div>
              <div class="ind-item">
                <div class="ind-label">VaR 95% día</div>
                <div class="ind-value" style="color:var(--amber)">${q.var_95_daily!=null?q.var_95_daily+'%':'—'}</div>
              </div>
              <div class="ind-item">
                <div class="ind-label">Max DD 6M</div>
                <div class="ind-value" style="color:var(--red)">${q.max_drawdown_6m!=null?q.max_drawdown_6m+'%':'—'}</div>
              </div>
              <div class="ind-item">
                <div class="ind-label">Score técnico</div>
                <div class="ind-value" style="color:${scoreColor(q.technical_score)}">${q.technical_score}</div>
              </div>
              <div class="ind-item">
                <div class="ind-label">Score fund.</div>
                <div class="ind-value" style="color:${scoreColor(q.fundamental_score)}">${q.fundamental_score}</div>
              </div>
              <div class="ind-item" style="border:1px solid ${scoreColor(q.composite_score)}40;background:${scoreColor(q.composite_score)}10">
                <div class="ind-label">COMPUESTO</div>
                <div class="ind-value" style="color:${scoreColor(q.composite_score)}">${q.composite_score}</div>
              </div>
            </div>
            <!-- Niveles operativos -->
            ${q.levels ? `
            <div style="font-size:8px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px">Niveles operativos (ATR-based · R:R 2:1)</div>
            <div class="levels-row">
              <div class="level-box" style="border-color:rgba(79,142,247,.3);background:rgba(79,142,247,.07)">
                <div class="level-label" style="color:var(--blue)">Entrada</div>
                <div class="level-price" style="color:var(--blue)">$${q.levels.entry?.toLocaleString('en-US')}</div>
                <div class="level-pct">precio actual</div>
              </div>
              <div class="level-box" style="border-color:rgba(247,79,79,.3);background:rgba(247,79,79,.07)">
                <div class="level-label" style="color:var(--red)">Stop-loss</div>
                <div class="level-price" style="color:var(--red)">$${q.levels.stop?.toLocaleString('en-US')}</div>
                <div class="level-pct">-${q.levels.stop_pct}%</div>
              </div>
              <div class="level-box" style="border-color:rgba(0,212,170,.3);background:rgba(0,212,170,.07)">
                <div class="level-label" style="color:var(--green)">Target</div>
                <div class="level-price" style="color:var(--green)">$${q.levels.target?.toLocaleString('en-US')}</div>
                <div class="level-pct">+${q.levels.target_pct}%</div>
              </div>
            </div>
            <div style="display:flex;gap:8px;margin-bottom:10px;font-size:9px;font-family:var(--mono)">
              <span style="color:var(--gold)">Kelly sizing: ${q.kelly!=null?Math.round(q.kelly*100)+'% de cartera':'—'}</span>
              <span style="color:var(--muted)">·</span>
              <span style="color:var(--amber)">Momentum 3M: ${mom3!=null?(mom3>=0?'+':'')+fmt(mom3,1)+'%':'—'}</span>
            </div>` : ''}
            <!-- Kahneman analysis -->
            ${a.analysis?.thesis ? `
            <div class="kahneman-section">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                <div style="font-size:8px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em">Análisis Kahneman</div>
                ${cal.signal ? `<span class="signal-badge ${signalClass(cal.signal)}">${signalLabel(cal.signal)} · p=${cal.prob||'?'}% ±${cal.prob_interval||'?'}%</span>` : ''}
              </div>
              <div class="k-tab-row">
                <button class="k-tab active" onclick="showKTab(this,'thesis-${m.id}')">Hipótesis</button>
                <button class="k-tab" onclick="showKTab(this,'premortem-${m.id}')">Pre-mortem</button>
                <button class="k-tab" onclick="showKTab(this,'calib-${m.id}')">Calibración</button>
              </div>
              <div id="thesis-${m.id}" class="k-content">${a.analysis.thesis||'—'}</div>
              <div id="premortem-${m.id}" class="k-content" style="display:none">${a.analysis.premortem||'—'}</div>
              <div id="calib-${m.id}" class="k-content" style="display:none">${cal.invalidation?'Invalidar si: '+cal.invalidation+'\n\n':''} ${cal.summary||'—'}</div>
            </div>` : ''}
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function showKTab(btn, contentId){
  const card = btn.closest('.asset-card');
  card.querySelectorAll('.k-tab').forEach(t => t.classList.remove('active'));
  card.querySelectorAll('.k-content').forEach(c => c.style.display = 'none');
  btn.classList.add('active');
  const el = document.getElementById(contentId);
  if(el) el.style.display = 'block';
}

function renderRegions(regions){
  if(!regions?.length) return '';
  return `
    <div class="section-title">Análisis de regiones — PIB World Bank</div>
    <div class="regions-grid">
      ${regions.map(r=>`
      <div class="region-card">
        <div class="region-name">${r.name}</div>
        <div class="region-sub">${r.region} · ${r.currency||'—'} ${r.fx_usd?'· $1 = '+r.fx_usd+' '+r.currency:''}</div>
        <div class="region-gdp" style="color:${r.gdp_latest>4?'var(--green)':r.gdp_latest>2?'var(--amber)':'var(--red)'}">
          ${r.gdp_latest!=null?(r.gdp_latest>0?'+':'')+r.gdp_latest+'%':'N/A'}
        </div>
        <div class="region-trend" style="color:var(--muted)">PIB · tendencia ${r.gdp_trend}</div>
        <div style="margin-top:7px">
          <div style="height:3px;background:var(--bg3);border-radius:2px;overflow:hidden">
            <div style="width:${Math.min(100,Math.max(0,(r.score||50)))}%;height:100%;background:${scoreColor(r.score||50)};border-radius:2px"></div>
          </div>
          <div style="font-size:8px;font-family:var(--mono);color:var(--muted);margin-top:3px">Score atractivo: ${r.score||50}/100</div>
        </div>
      </div>`).join('')}
    </div>`;
}

function renderMacro(macro){
  if(!macro) return '';
  const f = macro.fred || {};
  const fx = macro.fx_rates || {};
  const eia = macro.eia_crude;
  const items = [
    {label:'FED Funds Rate', value: f.fed_funds_rate!=null ? f.fed_funds_rate+'%' : '—', color:'var(--red)'},
    {label:'Yield Curve 10Y-2Y', value: f.yield_curve_spread!=null ? f.yield_curve_spread+'bps' : '—', color: f.yield_curve_spread>=0?'var(--green)':'var(--red)'},
    {label:'DXY Index', value: f.dxy_index!=null ? fmt(f.dxy_index,1) : '—', color:'var(--blue)'},
    {label:'EUR/USD', value: fx.EUR!=null ? fx.EUR.toFixed(4) : '—', color:'var(--text)'},
    {label:'USD/INR', value: fx.INR!=null ? fx.INR.toFixed(2) : '—', color:'var(--text)'},
    {label:'USD/BRL', value: fx.BRL!=null ? fx.BRL.toFixed(3) : '—', color:'var(--text)'},
    {label:'Inventarios crudos', value: eia?.latest!=null ? Math.round(eia.latest)+'M bbl' : '—', color:'var(--amber)'},
    {label:'Inv. vs Media 5Y', value: eia?.vs_avg!=null ? (eia.vs_avg>0?'+':'')+eia.vs_avg+'%' : '—', color: eia?.vs_avg!=null?(eia.vs_avg<0?'var(--green)':'var(--red)'):'var(--muted)'},
  ];
  return `
    <div class="section-title">Macro global — FRED + Frankfurter + EIA</div>
    <div class="macro-grid">
      ${items.map(i=>`
      <div class="macro-card">
        <div class="macro-label">${i.label}</div>
        <div class="macro-value" style="color:${i.color}">${i.value}</div>
      </div>`).join('')}
    </div>`;
}

function renderAudit(log){
  if(!log?.length) return '';
  return `
    <div class="section-title">Log de auditoría</div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:24px">
      <table class="audit-table">
        <thead><tr>
          <th>Activo</th><th>Timestamp</th><th>Score comp.</th>
          <th>Señal</th><th>Llamadas Claude</th><th>Estado</th>
        </tr></thead>
        <tbody>
          ${log.map(l=>`<tr>
            <td>${l.asset||'—'}</td>
            <td>${l.timestamp||'—'}</td>
            <td style="color:${scoreColor(l.scores?.composite||50)}">${l.scores?.composite||'—'}</td>
            <td><span class="signal-badge ${signalClass(l.signal||'')}" style="font-size:8px;padding:2px 6px">${signalLabel(l.signal||'')}</span></td>
            <td style="color:var(--muted)">${l.claude_calls!=null?l.claude_calls:'—'}</td>
            <td style="color:${l.status==='quantitative_complete'?'var(--green)':'var(--muted)'}">${l.status||'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

async function loadAndRender(){
  try{
    const r = await fetch('./results.json?t=' + Date.now());
    if(!r.ok) throw new Error('results.json no encontrado (HTTP ' + r.status + ')');
    const data = await r.json();

    $('updated-at').textContent = 'Actualizado: ' + (data.generated_at || '—') + ' · ' + (data.quarter||'');
    $('loading').style.display  = 'none';
    $('app').style.display      = 'block';

    $('app').innerHTML = [
      renderAlerts(data.alerts),
      renderRanking(data.ranking),
      renderAssets(data.assets),
      renderRegions(data.regions),
      renderMacro(data.macro),
      renderAudit(data.audit_log),
    ].join('');

    // Animar score bars
    setTimeout(()=>{
      document.querySelectorAll('.score-fill, .sfill').forEach(el=>{
        el.style.transition = 'width 1.2s ease';
      });
    }, 100);

  } catch(e){
    $('loading').innerHTML = `
      <div style="color:var(--red);font-family:var(--mono);font-size:11px;text-align:center;max-width:400px">
        <div style="font-size:24px;margin-bottom:12px">⚠</div>
        <div style="font-weight:700;margin-bottom:8px">results.json no encontrado</div>
        <div style="color:var(--muted);font-size:10px;line-height:1.6">
          El motor de análisis todavía no ha corrido.<br>
          Ve a GitHub Actions → Run workflow para ejecutarlo manualmente.<br><br>
          Error: ${e.message}
        </div>
      </div>`;
  }
}

loadAndRender();
// Auto-refresh cada 10 minutos
setInterval(loadAndRender, 10 * 60 * 1000);
</script>
</body>
</html>
