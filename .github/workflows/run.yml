name: GeoMacro Intel — Análisis Autónomo

on:
  schedule:
    - cron: '0 6,12,18,0 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Setup Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic==0.49.0

      - name: Run GeoMacro Intel v8
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY:        ${{ secrets.FRED_API_KEY }}
          NEWS_API_KEY:        ${{ secrets.NEWS_API_KEY }}
          PORTFOLIO_VALUE_EUR: ${{ secrets.PORTFOLIO_VALUE_EUR }}
          UNITS_BTC:           ${{ secrets.UNITS_BTC }}
          UNITS_NVDA:          ${{ secrets.UNITS_NVDA }}
          UNITS_MSCI:          ${{ secrets.UNITS_MSCI }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python analysis_engine.py

      - name: Commit and push results.json
        run: |
          git config user.name  "GeoMacro Bot"
          git config user.email "bot@geomacro.local"
          git add results.json paper_trades.json || true
          git diff --staged --quiet || git commit -m "auto: analisis $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --no-rebase --strategy-option=ours origin main || true
          git push || true
