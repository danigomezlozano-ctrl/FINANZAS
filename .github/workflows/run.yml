name: GeoMacro Intel — Análisis Autónomo

on:
  schedule:
    - cron: '0 6,12,18,0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run GeoMacro Intel v7
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY:        ${{ secrets.FRED_API_KEY }}
          NEWS_API_KEY:        ${{ secrets.NEWS_API_KEY }}
          PORTFOLIO_VALUE_EUR: ${{ secrets.PORTFOLIO_VALUE_EUR }}
          UNITS_BTC:           ${{ secrets.UNITS_BTC }}
          UNITS_NVDA:          ${{ secrets.UNITS_NVDA }}
          UNITS_MSCI:          ${{ secrets.UNITS_MSCI }}
        run: python analysis_engine.py

      - name: Commit and push results.json
        run: |
          git config user.name  "GeoMacro Bot"
          git config user.email "bot@geomacro.local"
          git add results.json
          git diff --staged --quiet || git commit -m "auto: analisis $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
