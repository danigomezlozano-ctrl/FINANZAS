name: GeoMacro Intel — Análisis Autónomo

on:
  schedule:
    - cron: '0 6,12,18,0 * * *'   # cada 6h: 06:00, 12:00, 18:00, 00:00 UTC
  workflow_dispatch:                # también permite ejecución manual desde GitHub

permissions:
  contents: write   # necesario para hacer push de results.json

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run analysis engine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY:      ${{ secrets.FRED_API_KEY }}
          NEWS_API_KEY:      ${{ secrets.NEWS_API_KEY }}
        run: python analysis_engine.py

      - name: Commit & push results.json
        run: |
          git config user.name  "GeoMacro Bot"
          git config user.email "bot@geomacro.local"
          git add results.json
          git diff --staged --quiet || git commit -m "auto: análisis $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
