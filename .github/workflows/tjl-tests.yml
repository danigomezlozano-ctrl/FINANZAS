name: TJL validation tests

on:
  push:
    paths:
      - "analysis_engine.py"
      - "tjl_validation.py"
      - "ops_health.py"
      - "paper_trades.json"
      - "test_tjl_validation.py"
      - "test_analysis_engine_integration.py"
      - "test_ops_health.py"
      - ".github/workflows/tjl-tests.yml"
      - ".github/workflows/ops-supervisor.yml"
  pull_request:
    paths:
      - "analysis_engine.py"
      - "tjl_validation.py"
      - "ops_health.py"
      - "paper_trades.json"
      - "test_tjl_validation.py"
      - "test_analysis_engine_integration.py"
      - "test_ops_health.py"
      - ".github/workflows/tjl-tests.yml"
      - ".github/workflows/ops-supervisor.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependency
        run: python -m pip install --upgrade pytest

      - name: Compile
        run: |
          python -m py_compile analysis_engine.py tjl_validation.py ops_health.py
          python -m py_compile test_tjl_validation.py test_analysis_engine_integration.py test_ops_health.py

      - name: Run tests
        env:
          TELEGRAM_BOT_TOKEN: ""
          TELEGRAM_CHAT_ID: ""
          FRED_API_KEY: ""
          NEWS_API_KEY: ""
          ANTHROPIC_API_KEY: ""
        run: pytest -q
