name: TJL validation tests

on:
  push:
    paths:
      - "analysis_engine.py"
      - "tjl_validation.py"
      - "paper_trades.json"
      - "test_tjl_validation.py"
      - "test_analysis_engine_integration.py"
      - ".github/workflows/tjl-tests.yml"
  pull_request:
    paths:
      - "analysis_engine.py"
      - "tjl_validation.py"
      - "paper_trades.json"
      - "test_tjl_validation.py"
      - "test_analysis_engine_integration.py"
      - ".github/workflows/tjl-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependency
        run: python -m pip install --upgrade pytest

      - name: Compile
        run: |
          python -m py_compile analysis_engine.py tjl_validation.py
          python -m py_compile test_tjl_validation.py test_analysis_engine_integration.py

      - name: Run tests
        env:
          TELEGRAM_BOT_TOKEN: ""
          TELEGRAM_CHAT_ID: ""
          FRED_API_KEY: ""
          NEWS_API_KEY: ""
          ANTHROPIC_API_KEY: ""
        run: pytest -q
